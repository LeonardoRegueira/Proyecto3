<div class="listaTodos">
        <div class="tickets" *ngFor="let listaProgreso of listaTareasProgreso">
            <div class="card shadow-sm col-4">
                <div class="card-body">
                    <h5>{{listaProgreso.titulo}}</h5>
                    <p class="descripcion">{{listaProgreso.descripcion}}</p>
                    <p>Prioridad: {{listaProgreso.nivel_prioridad}}</p>
                    <button (click)= "detalles(listaProgreso.id)">Ver detalles</button>
                </div>
            </div>
        </div>
</div>
