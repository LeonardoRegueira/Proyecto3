<div class="listaTodos">
        <div class="tickets" *ngFor="let listaCompletas of listaTareaCompletas">
            <div class="card shadow-sm col-4">
                <div class="card-body">
                    <h5>{{listaCompletas.titulo}}</h5>
                    <p class="descripcion">{{listaCompletas.descripcion}}</p>
                    <p>Prioridad: {{listaCompletas.nivel_prioridad}}</p>
                    <button (click)= "detalles(listaCompletas.id)">Ver detalles</button>
                </div>
            </div>
        </div>
</div>
