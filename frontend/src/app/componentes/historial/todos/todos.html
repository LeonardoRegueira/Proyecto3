
<div class="listaTodos">

        <div class="tickets" *ngFor="let listaT of listaTodos">
            <div class="card shadow-sm col-4">
                <div class="card-body">
                    <h5>{{listaT.titulo}}</h5>
                    <p class="descripcion">{{listaT.descripcion}}</p>
                    <p>{{listaT.estado}}</p>
                    
                </div>
            </div>
        </div>

</div>
