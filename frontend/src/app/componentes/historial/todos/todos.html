<div class="listaTodos">
        <div class="tickets" *ngFor="let listaTodas of listaTareasTodas">
            <div class="card shadow-sm col-4">
                <div class="card-body">
                    <h5>{{listaTodas.titulo}}</h5>
                    <p class="descripcion">{{listaTodas.descripcion}}</p>
                    <p>{{listaTodas.nivel_prioridad}}</p>
                    <p>{{listaTodas.estado}}</p>
                    <button (click)= "detalles(listaTodas.id)">Ver detalles</button>
                </div>
            </div>
        </div>
</div>
