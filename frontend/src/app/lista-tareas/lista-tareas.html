<h2>Lista de tareas</h2>

<p *ngIf="cargando">Cargando tareas...</p>

<p *ngIf="errorMensaje">{{ errorMensaje }}</p>

<p *ngIf="!cargando && tareas.length === 0">
  No hay tareas disponibles.
</p>

<div class="tarea-card" *ngFor="let tarea of tareas">

  <h3>{{ tarea.titulo }}</h3>

  <p>{{ tarea.descripcion }}</p>

  <p>Estado: {{ tarea.estado }}</p>

  <a [routerLink]="['/tareas', tarea.id]">
    Ver detalle
  </a>

</div>
