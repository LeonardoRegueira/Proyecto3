<div class="component">
  <aside class="component_menu">
    <a class="class_title" routerLink="/home" aria-label="Ir al panel principal">
      <img alt="" aria-hidden="true">
      <p>SGT</p>
    </a>

    <nav class="class_menu" aria-label="Menu principal">
      <a
        class="menu-link"
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <img alt="" class="panel" aria-hidden="true">
        <span>Panel Principal</span>
      </a>

      <a class="menu-link" routerLink="/ingreso-tarea" routerLinkActive="active">
        <img alt="" class="nuevo" aria-hidden="true">
        <span>Nueva Tarea</span>
      </a>

      <a class="menu-link" routerLink="/historial" routerLinkActive="active">
        <img alt="" class="pendientes" aria-hidden="true">
        <span>Listas de Tareas</span>
      </a>

      <a class="menu-link" routerLink="/cancelado" routerLinkActive="active">
        <img alt="" class="canceladas" aria-hidden="true">
        <span>Tareas Canceladas</span>
      </a>
    </nav>
  </aside>

  <main class="contenedor">
    <router-outlet></router-outlet>
  </main>
</div>
